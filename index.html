<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bir Mesajım Var 💌</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            background: linear-gradient(135deg, #ff4e8b, #111);
            font-family: Arial, sans-serif;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100dvh; /* mobil fix */
        }

        .kutu {
            background-color: rgba(0,0,0,0.7);
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 25px pink;
            text-align: center;
        }

        h1 {
            color: #ff4e8b;
            font-size: 24px;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .btn {
            background-color: #ff4e8b;
            color: white;
            border: none;
            padding: 14px 25px;
            margin-top: 20px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:hover {
            background-color: white;
            color: #ff4e8b;
        }
    </style>
</head>

<body>

    <div class="kutu">
        <h1>Bir Şey Söylemem Lazım...</h1>

        <p>
            Seninle konuşmak günümün en güzel kısmı.  
            Enerjin ayrı, gülüşün ayrı güzel.  
            Sen olunca her şey biraz daha güzel 🙂
        </p>

        <button class="btn" onclick="mesaj()">Tıkla</button>

        <p id="sonuc"></p>
    </div>

    <script>
        function mesaj() {
            document.getElementById("sonuc").innerHTML =
            "İyi ki varsın 💫";
        }
    </script>

</body>
</html>
